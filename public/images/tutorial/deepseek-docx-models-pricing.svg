<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 780" role="img" aria-label="DeepSeek 模型价格页面示意">
  <rect width="1600" height="780" fill="#ffffff"/>
  <rect width="1600" height="46" fill="#fafafa"/>
  <text x="22" y="30" fill="#111827" font-family="Arial, sans-serif" font-size="20" font-weight="700">DeepSeek API 文档</text>
  <rect x="0" y="46" width="260" height="734" fill="#f8fafc"/>
  <g font-family="Arial, sans-serif" font-size="16">
    <text x="28" y="92" fill="#64748b">快速开始</text>
    <text x="28" y="124" fill="#64748b">首次调用 API</text>
    <rect x="18" y="140" width="224" height="36" rx="6" fill="#eef2f7"/>
    <text x="28" y="164" fill="#2563eb" font-weight="700">模型 &amp; 价格</text>
    <text x="28" y="205" fill="#64748b">Token 用量计算</text>
    <text x="28" y="238" fill="#64748b">限速与隔离</text>
    <text x="28" y="271" fill="#64748b">错误码</text>
    <text x="28" y="304" fill="#64748b">接入 Agent 工具</text>
    <text x="28" y="337" fill="#64748b">API 指南</text>
  </g>
  <g transform="translate(370 96)">
    <text x="0" y="0" fill="#111827" font-family="Arial, sans-serif" font-size="48" font-weight="800">模型 &amp; 价格</text>
    <text x="0" y="70" fill="#1f2937" font-family="Arial, sans-serif" font-size="17">下表列模型、上下文长度、输出长度和功能支持，用于选择模型并控制成本。</text>
    <line x1="0" y1="104" x2="840" y2="104" stroke="#d1d5db"/>
    <text x="0" y="150" fill="#111827" font-family="Arial, sans-serif" font-size="28" font-weight="700">模型细节</text>
    <g font-family="Arial, sans-serif" font-size="16" text-anchor="middle">
      <rect x="0" y="180" width="840" height="390" fill="#fff" stroke="#e5e7eb"/>
      <rect x="0" y="180" width="840" height="48" fill="#f9fafb" stroke="#e5e7eb"/>
      <text x="180" y="210" fill="#111827" font-weight="700">模型</text>
      <text x="490" y="210" fill="#111827" font-weight="700">deepseek-v4-flash</text>
      <text x="700" y="210" fill="#111827" font-weight="700">deepseek-v4-pro</text>
      <rect x="0" y="228" width="840" height="60" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="180" y="264" fill="#111827" font-weight="700">Base URL</text>
      <text x="595" y="264" fill="#0284c7" font-weight="700">api.deepseek.com</text>
      <rect x="0" y="288" width="840" height="60" fill="#f9fafb" stroke="#e5e7eb"/>
      <text x="180" y="324" fill="#111827" font-weight="700">模型版本</text>
      <text x="490" y="324" fill="#111827" font-weight="700">V4 Flash</text>
      <text x="700" y="324" fill="#111827" font-weight="700">V4 Pro</text>
      <rect x="0" y="348" width="840" height="64" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="180" y="386" fill="#111827" font-weight="700">上下文长度</text>
      <text x="595" y="386" fill="#111827" font-weight="700">1M</text>
      <rect x="0" y="412" width="840" height="64" fill="#f9fafb" stroke="#e5e7eb"/>
      <text x="180" y="450" fill="#111827" font-weight="700">输出长度</text>
      <text x="595" y="450" fill="#111827" font-weight="700">最大 384K</text>
      <rect x="0" y="476" width="840" height="94" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="180" y="528" fill="#111827" font-weight="700">功能</text>
      <text x="490" y="512" fill="#2563eb" font-weight="700">Json Output</text>
      <text x="700" y="512" fill="#2563eb" font-weight="700">Tool Calls</text>
      <text x="490" y="545" fill="#111827" font-weight="700">支持</text>
      <text x="700" y="545" fill="#111827" font-weight="700">支持</text>
    </g>
  </g>
</svg>

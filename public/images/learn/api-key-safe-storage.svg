<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">API Key 安全保存</title>
  <desc id="desc">API Key 从控制台生成后保存到环境变量，不提交到公开仓库。</desc>
  <rect width="960" height="540" rx="32" fill="#f8fafc"/>
  <rect x="94" y="92" width="772" height="356" rx="24" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
  <g font-family="Arial, sans-serif">
    <text x="480" y="72" text-anchor="middle" font-size="30" font-weight="700" fill="#111827">API Key 安全保存</text>
    <rect x="150" y="158" width="220" height="94" rx="16" fill="#eef6ff" stroke="#b6d8ff"/>
    <text x="260" y="198" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">控制台生成</text>
    <text x="260" y="226" text-anchor="middle" font-size="15" fill="#475569">Create API Key</text>
    <rect x="370" y="285" width="220" height="94" rx="16" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="480" y="325" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">环境变量</text>
    <text x="480" y="353" text-anchor="middle" font-size="15" fill="#475569">AI_API_KEY</text>
    <rect x="590" y="158" width="220" height="94" rx="16" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="700" y="198" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">不要公开</text>
    <text x="700" y="226" text-anchor="middle" font-size="15" fill="#475569">不截图、不上传 Git</text>
    <path d="M370 205c52 8 86 32 110 80" stroke="#64748b" stroke-width="4" fill="none"/>
    <path d="M590 205c-52 8-86 32-110 80" stroke="#64748b" stroke-width="4" fill="none"/>
  </g>
</svg>

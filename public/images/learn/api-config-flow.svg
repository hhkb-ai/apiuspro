<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">API 配置三件套</title>
  <desc id="desc">API Key、Base URL 和模型名称组成一次 API 配置。</desc>
  <rect width="960" height="540" rx="32" fill="#f8fafc"/>
  <text x="480" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#111827">API 配置三件套</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="128" y="180" width="200" height="116" rx="20" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="228" y="226" font-size="23" font-weight="700" fill="#0f172a">API Key</text>
    <text x="228" y="260" font-size="15" fill="#475569">身份凭证</text>
    <rect x="380" y="180" width="200" height="116" rx="20" fill="#eef6ff" stroke="#b6d8ff"/>
    <text x="480" y="226" font-size="23" font-weight="700" fill="#0f172a">Base URL</text>
    <text x="480" y="260" font-size="15" fill="#475569">接口地址</text>
    <rect x="632" y="180" width="200" height="116" rx="20" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="732" y="226" font-size="23" font-weight="700" fill="#0f172a">模型名称</text>
    <text x="732" y="260" font-size="15" fill="#475569">选择能力</text>
    <rect x="268" y="354" width="424" height="66" rx="18" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
    <text x="480" y="395" font-size="20" font-weight="700" fill="#0f172a">保存到工具配置或 .env</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">API 报错排查清单</title>
  <desc id="desc">401、403、429 和 model not found 的常见排查方向。</desc>
  <rect width="960" height="540" rx="32" fill="#f8fafc"/>
  <text x="480" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#111827">第一次调用与报错排查</text>
  <g font-family="Arial, sans-serif">
    <rect x="154" y="132" width="652" height="300" rx="22" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
    <g font-size="20" fill="#0f172a">
      <text x="220" y="190" font-weight="700">401</text><text x="310" y="190">检查 API Key</text>
      <text x="220" y="248" font-weight="700">403</text><text x="310" y="248">检查账号和模型权限</text>
      <text x="220" y="306" font-weight="700">429</text><text x="310" y="306">检查限流、余额和额度</text>
      <text x="220" y="364" font-weight="700">404</text><text x="310" y="364">检查 model not found</text>
    </g>
    <g fill="none" stroke="#22c55e" stroke-linecap="round" stroke-linejoin="round" stroke-width="5">
      <path d="m656 178 16 16 34-40"/>
      <path d="m656 236 16 16 34-40"/>
      <path d="m656 294 16 16 34-40"/>
      <path d="m656 352 16 16 34-40"/>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">提示词公式</title>
  <desc id="desc">角色、背景、任务、要求和输出格式组成清晰提示词。</desc>
  <rect width="960" height="540" rx="32" fill="#f8fafc"/>
  <text x="480" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#111827">提示词公式</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <g fill="#ffffff" stroke="#d9e2ec" stroke-width="2">
      <rect x="88" y="170" width="136" height="86" rx="18"/>
      <rect x="252" y="170" width="136" height="86" rx="18"/>
      <rect x="416" y="170" width="136" height="86" rx="18"/>
      <rect x="580" y="170" width="136" height="86" rx="18"/>
      <rect x="744" y="170" width="136" height="86" rx="18"/>
    </g>
    <text x="156" y="222" font-size="21" font-weight="700" fill="#0f172a">角色</text>
    <text x="320" y="222" font-size="21" font-weight="700" fill="#0f172a">背景</text>
    <text x="484" y="222" font-size="21" font-weight="700" fill="#0f172a">任务</text>
    <text x="648" y="222" font-size="21" font-weight="700" fill="#0f172a">要求</text>
    <text x="812" y="222" font-size="21" font-weight="700" fill="#0f172a">格式</text>
    <rect x="180" y="326" width="600" height="88" rx="18" fill="#eef6ff" stroke="#b6d8ff"/>
    <text x="480" y="365" font-size="22" font-weight="700" fill="#0f172a">更稳定、可检查、可复用的 AI 回复</text>
    <text x="480" y="394" font-size="15" fill="#475569">把需求写清楚，比堆关键词更重要</text>
  </g>
</svg>
